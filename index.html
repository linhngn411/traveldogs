<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>TravelDogs 🐶</title>

    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="./assets/traveldogs.ico"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/traveldogs.ico"
    />
    <!-- Leaflet CSS (must load before JS) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- App styles -->
    <link rel="stylesheet" href="./styles/main.css" />
  </head>

  <body>
    <!-- ═══ NAV ═══════════════════════════════════════════ -->
    <nav id="main-nav">
      <div class="nav-logo" onclick="goHome()"><span>🐶</span> TravelDogs</div>
      <div class="nav-right">
        <div class="nav-back" id="nav-back" onclick="handleBack()"></div>
      </div>
    </nav>

    <!-- ═══ HOME PAGE ══════════════════════════════════════ -->
    <div class="page active" id="home-page">
      <div class="home-hero">
        <h1>TravelDogs 🐶</h1>
        <p>Normal dogs go travel!!!</p>
      </div>
      <div class="projects-section">
        <div class="section-heading">🗺️ Chuyến đi của bạn</div>
        <div class="projects-grid" id="projects-grid">
          <div
            style="
              padding: 40px;
              text-align: center;
              color: var(--text-light);
              grid-column: 1/-1;
            "
          >
            ⏳ Đang tải dữ liệu...
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ TIMELINE PAGE ══════════════════════════════════ -->
    <div class="page" id="timeline-page">
      <div class="timeline-header">
        <h2 id="tl-trip-name"></h2>
        <p id="tl-trip-dates"></p>
        <a
          id="tl-sheet-link"
          class="sheet-link"
          target="_blank"
          style="display: none"
        >
          📊 Google Sheets
          <i
            class="fa fa-external-link"
            aria-hidden="true"
            style="font-size: 0.7rem; margin-left: 2px"
          ></i>
        </a>
      </div>
      <div class="day-tabs" id="day-tabs"></div>
      <div class="timeline-wrap" id="timeline-wrap"></div>
    </div>

    <!-- ═══ DETAIL PAGE ════════════════════════════════════ -->
    <div class="page" id="detail-page">
      <!-- Top bar -->

      <!-- Body: map + info panel -->
      <div class="detail-body">
        <!-- Map -->
        <div class="map-panel">
          <div id="detail-map"></div>
        </div>

        <!-- Info panel -->
        <div class="info-panel" id="info-panel">
          <div
            class="pull-handle"
            id="pull-handle"
            onclick="toggleMobilePanel()"
          ></div>
          <div class="detail-topbar">
            <button
              class="icon-btn"
              id="btn-prev"
              onclick="navigateDetail(-1)"
              title="Previous"
            >
              ←
            </button>

            <div class="tl-dropdown-wrap tl-dropdown">
              <div class="detail-title" onclick="toggleDropdown()">
                <span id="detail-time-text" class="detail-time"></span>
                <span id="detail-title-text">…</span>
                <span class="dropdown-caret">▾</span>
              </div>
              <div class="dropdown-menu" id="dropdown-menu"></div>
            </div>

            <button
              class="icon-btn"
              id="btn-next"
              onclick="navigateDetail(1)"
              title="Next"
            >
              →
            </button>
          </div>

          <!-- Tabs -->
          <div class="detail-tabs">
            <div class="detail-tab active" onclick="switchTab('info')">
              📋 Thông tin
            </div>
            <div class="detail-tab" onclick="switchTab('direction')">
              🗺️ Chỉ đường
            </div>
            <div class="detail-tab" onclick="switchTab('content')">
              📱 Content
            </div>
            <div class="detail-tab" onclick="switchTab('expense')">
              💸 Chi tiêu
            </div>
          </div>

          <!-- Tab panes -->
          <div class="tab-pane active" id="tab-info"></div>
          <div class="tab-pane" id="tab-direction"></div>
          <div class="tab-pane" id="tab-content"></div>
          <div class="tab-pane" id="tab-expense"></div>
        </div>
      </div>
    </div>

    <!-- ═══ SCRIPTS ════════════════════════════════════════ -->
    <!-- Leaflet JS — loaded synchronously so L is available when app.js runs -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <!-- App logic -->
    <script src="./js/app.js"></script>
  </body>
</html>
